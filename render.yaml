services:
  - type: web
    name: nasa-cmapss-rul
    runtime: python
    buildCommand: pip install -r app/requirements_render.txt
    startCommand: streamlit run app/app.py --server.port=$PORT --server.address=0.0.0.0 --server.headless=true
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
